name: Build Sohan APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── Debug build (every push) ──────────────────────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sohan-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Signed release build ──────────────────────────────────────────────────
  build-release:
    name: Signed Release APK
    runs-on: ubuntu-latest
    # Only runs when a version tag is pushed  e.g. v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Decode the keystore from GitHub Secret (stored as base64)
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > sohan-release.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PATH:      sohan-release.jks
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: Sohan-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # Also create a GitHub Release with the APK attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: Sohan ${{ github.ref_name }}
          body: |
            ## Sohan ${{ github.ref_name }}

            Wireless ADB Bridge — Root ছাড়াই shell-level permission।

            ### Install করার নিয়ম
            1. `app-release.apk` ডাউনলোড করো
            2. ফোনে install করো
            3. Settings → Developer Options → Wireless debugging → চালু করো
            4. Sohan খোলো — auto-connect হবে
            5. "Allow ADB debugging?" → Allow চাপো
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
